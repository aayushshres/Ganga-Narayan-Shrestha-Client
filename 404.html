<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // GitHub Pages SPA redirect.
    // On github.io (no custom domain) keep 1 path segment (the repo name).
    // On a custom domain at root keep 0 segments.
    var segs = window.location.hostname.endsWith('.github.io') ? 1 : 0;
    var l = window.location;
    l.replace(
      l.protocol + '//' + l.host +
      l.pathname.split('/').slice(0, 1 + segs).join('/') + '/?/' +
      l.pathname.slice(1).split('/').slice(segs).join('/').replace(/&/g, '~and~') +
      (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
      l.hash
    );
  </script>
</head>
<body></body>
</html>
